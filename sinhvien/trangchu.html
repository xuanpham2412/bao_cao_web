<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Trang Chủ Sinh Viên</title>
    <link rel="stylesheet" href="trangchu.css" />
  </head>
  <body>
    <div class="header">
      <h2>Hệ thống Quản lý Đại học</h2>

        <span

        <button class="btn-danger" onclick="dangXuat()">Đăng Xuất</button>
      </div>
    </div>

    <div class="container-layout">

      <div class="main-content">

              <label>Mã Sinh Viên</label><span id="txtMaSV">...</span>

            </div>
            <div class="info-item">
              <label>Giới Tính</label><span id="txtGioiTinh">...</span>
            </div>
            <div class="info-item">
              <label>Lớp Hiện Tại</label><span id="txtMaLop">...</span>
