<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Lịch Học</title>
    <link rel="stylesheet" href="trangchu.css" />
  </head>
  <body>
    <div class="header">
      <h2>Hệ thống Quản lý Đại học</h2>

        <span
          id="welcomeName"

        <button class="btn-danger" onclick="dangXuat()">Đăng Xuất</button>
      </div>
    </div>

    <div class="container-layout">

        <a href="trangchu.html" class="menu-item">Thông Tin Cá Nhân</a>

                  <th>Thứ 7</th>

              </thead>
              <tbody id="bangLichHoc">

                  <td colspan="7" class="text-center">Đang tải dữ liệu...</td>
                </tr>
              </tbody>
