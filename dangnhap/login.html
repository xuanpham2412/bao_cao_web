<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập - Hệ Thống Quản Lý Sinh Viên</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="login-container">
      <div class="login-box">
        <h2>Đăng Nhập Hệ Thống</h2>
        <p>Vui lòng nhập tài khoản để tiếp tục</p>

        <form id="loginForm">
          <div class="input-group">
            <label for="username">Tên đăng nhập</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Nhập tài khoản"
              required
            />
          </div>

          <div class="input-group">
            <label for="password">Mật khẩu</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Nhập mật khẩu"
              required
            />
          </div>

          <div
            id="errorMessage"
            class="error-message"
            style="display: none; color: red; margin-bottom: 15px"
          ></div>

          <button type="submit" id="loginBtn">Đăng Nhập</button>
        </form>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
